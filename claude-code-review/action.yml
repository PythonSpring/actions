name: "Claude Code Review"
description: "Use Claude Code to review pull request changes and post feedback as a PR comment"

inputs:
  anthropic-api-key:
    description: "Anthropic API key"
    required: true
  github-token:
    description: "GitHub token for posting PR comments"
    required: true
  model:
    description: "Claude model to use"
    required: false
    default: "claude-sonnet-4-20250514"
  review-prompt:
    description: "Custom review instructions (appended to the default prompt)"
    required: false
    default: ""
  max-diff-lines:
    description: "Maximum diff lines to include (to avoid token limits)"
    required: false
    default: "5000"

runs:
  using: "composite"
  steps:
    - name: Get PR diff
      id: diff
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        PR_NUMBER="${{ github.event.pull_request.number }}"
        echo "Fetching diff for PR #${PR_NUMBER}..."

        DIFF=$(gh pr diff "$PR_NUMBER" --repo "${{ github.repository }}")
        DIFF_LINES=$(echo "$DIFF" | wc -l)
        MAX_LINES=${{ inputs.max-diff-lines }}

        if [ "$DIFF_LINES" -gt "$MAX_LINES" ]; then
          DIFF=$(echo "$DIFF" | head -n "$MAX_LINES")
          DIFF="${DIFF}

        ... (diff truncated at ${MAX_LINES} lines, total was ${DIFF_LINES} lines)"
        fi

        # Write diff to a temp file to avoid shell escaping issues
        echo "$DIFF" > /tmp/pr_diff.txt
        echo "diff_lines=$DIFF_LINES" >> "$GITHUB_OUTPUT"

    - name: Get PR metadata
      id: pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        PR_NUMBER="${{ github.event.pull_request.number }}"
        PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json title -q '.title')
        PR_BODY=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json body -q '.body')

        echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"

        # Write body to file to avoid escaping issues
        echo "$PR_BODY" > /tmp/pr_body.txt

    - name: Install Claude Code
      shell: bash
      run: npm install -g @anthropic-ai/claude-code

    - name: Run Claude Code Review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        PR_TITLE="${{ steps.pr.outputs.title }}"
        PR_BODY=$(cat /tmp/pr_body.txt)
        DIFF=$(cat /tmp/pr_diff.txt)
        CUSTOM_PROMPT="${{ inputs.review-prompt }}"

        PROMPT="You are reviewing a pull request. Provide a concise, actionable code review.

        ## PR Title
        ${PR_TITLE}

        ## PR Description
        ${PR_BODY}

        ## Diff
        \`\`\`diff
        ${DIFF}
        \`\`\`

        ## Review Instructions
        Review this PR diff and provide feedback in the following format:

        ### Summary
        A 1-2 sentence summary of what this PR does.

        ### Issues Found
        List any bugs, security concerns, or correctness problems. If none, say \"No issues found.\"

        ### Suggestions
        List actionable improvement suggestions (code style, performance, readability). If none, say \"No suggestions.\"

        ### Verdict
        One of: APPROVE, REQUEST_CHANGES, or COMMENT — with a one-line justification.

        ${CUSTOM_PROMPT}"

        echo "$PROMPT" | claude --print --model "${{ inputs.model }}" > /tmp/review_output.txt

    - name: Post review comment
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        PR_NUMBER="${{ github.event.pull_request.number }}"
        REVIEW=$(cat /tmp/review_output.txt)

        COMMENT="## Claude Code Review

        ${REVIEW}

        ---
        *Reviewed by Claude (${{ inputs.model }}) via [PythonSpring/actions/claude-code-review](https://github.com/PythonSpring/actions)*"

        gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "$COMMENT"
