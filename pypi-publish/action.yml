name: "PyPI Publish"
description: "Build and publish a PDM project to PyPI with version dedup check"

inputs:
  python-version:
    description: "Python version to use for building"
    required: false
    default: "3.11"
  version-file:
    description: "Path to the __version__.py file"
    required: true
  pypi-package-name:
    description: "Package name on PyPI (e.g. py-spring-core)"
    required: true
  pypi-token:
    description: "PyPI API token"
    required: true

outputs:
  version:
    description: "The detected version string"
    value: ${{ steps.version.outputs.version }}
  published:
    description: "Whether the version was published (true/false)"
    value: ${{ steps.check.outputs.exists == 'false' }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install PDM and Twine
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install pdm twine

    - name: Extract version
      id: version
      shell: bash
      run: |
        VERSION=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' "${{ inputs.version-file }}")
        if [ -z "$VERSION" ]; then
          echo "ERROR: Failed to extract version from ${{ inputs.version-file }}"
          exit 1
        fi
        echo "Detected version: $VERSION"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Check if version exists on PyPI
      id: check
      shell: bash
      run: |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/${{ inputs.pypi-package-name }}/${{ steps.version.outputs.version }}/json")
        if [ "$STATUS" = "200" ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Version ${{ steps.version.outputs.version }} already exists on PyPI, skipping."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install dependencies
      if: steps.check.outputs.exists == 'false'
      shell: bash
      run: pdm install

    - name: Run tests before publish
      if: steps.check.outputs.exists == 'false'
      shell: bash
      run: pdm run pytest

    - name: Build package
      if: steps.check.outputs.exists == 'false'
      shell: bash
      run: pdm build

    - name: Publish to PyPI
      if: steps.check.outputs.exists == 'false'
      shell: bash
      env:
        TWINE_USERNAME: "__token__"
        TWINE_PASSWORD: ${{ inputs.pypi-token }}
      run: twine upload --verbose dist/*
