name: "Claude Docs Update"
description: "Analyze code diff on main branch merge and create a PR in pyspring-docs with documentation updates generated by Claude Code"

inputs:
  anthropic-api-key:
    description: "Anthropic API key"
    required: true
  anthropic-base-url:
    description: "Anthropic API base URL"
    required: false
    default: ""
  github-token:
    description: "GitHub PAT with write access to the docs repo"
    required: true
  docs-repo:
    description: "Target documentation repository (owner/repo)"
    required: false
    default: "PythonSpring/pyspring-docs"
  source-repo-name:
    description: "Human-readable name of the source repo (e.g. pyspring-core)"
    required: true
  model:
    description: "Claude model to use"
    required: false
    default: "claude-sonnet-4-20250514"
  max-diff-lines:
    description: "Maximum diff lines to include (to avoid token limits)"
    required: false
    default: "5000"
  custom-prompt:
    description: "Additional instructions for Claude (appended to the default prompt)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Get merge commit diff
      id: diff
      shell: bash
      run: |
        echo "Fetching diff for merge commit..."
        DIFF=$(git diff HEAD~1..HEAD)
        DIFF_LINES=$(echo "$DIFF" | wc -l)
        MAX_LINES=${{ inputs.max-diff-lines }}

        if [ "$DIFF_LINES" -gt "$MAX_LINES" ]; then
          DIFF=$(echo "$DIFF" | head -n "$MAX_LINES")
          DIFF="${DIFF}

        ... (diff truncated at ${MAX_LINES} lines, total was ${DIFF_LINES} lines)"
        fi

        echo "$DIFF" > /tmp/code_diff.txt
        echo "diff_lines=$DIFF_LINES" >> "$GITHUB_OUTPUT"

        SHORT_SHA=$(git rev-parse --short HEAD)
        COMMIT_MSG=$(git log -1 --pretty=%B)
        echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
        echo "$COMMIT_MSG" > /tmp/commit_msg.txt

    - name: Checkout docs repo
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        echo "Cloning ${{ inputs.docs-repo }}..."
        git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ inputs.docs-repo }}.git" /tmp/pyspring-docs

    - name: Collect docs context
      shell: bash
      run: |
        echo "Collecting documentation context..."

        # Collect mkdocs.yml
        if [ -f /tmp/pyspring-docs/mkdocs.yml ]; then
          echo "=== mkdocs.yml ===" > /tmp/docs_context.txt
          cat /tmp/pyspring-docs/mkdocs.yml >> /tmp/docs_context.txt
          echo "" >> /tmp/docs_context.txt
        fi

        # Collect all markdown files from docs/
        if [ -d /tmp/pyspring-docs/docs ]; then
          find /tmp/pyspring-docs/docs -name "*.md" -type f | sort | while read -r file; do
            REL_PATH="${file#/tmp/pyspring-docs/}"
            echo "=== ${REL_PATH} ===" >> /tmp/docs_context.txt
            cat "$file" >> /tmp/docs_context.txt
            echo "" >> /tmp/docs_context.txt
          done
        fi

        CONTEXT_LINES=$(wc -l < /tmp/docs_context.txt)
        echo "Collected ${CONTEXT_LINES} lines of documentation context"

    - name: Install Claude Code
      shell: bash
      run: npm install -g @anthropic-ai/claude-code

    - name: Run Claude Code for docs analysis
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic-base-url }}
      run: |
        SOURCE_REPO="${{ inputs.source-repo-name }}"
        DIFF=$(cat /tmp/code_diff.txt)
        DOCS_CONTEXT=$(cat /tmp/docs_context.txt)
        COMMIT_MSG=$(cat /tmp/commit_msg.txt)
        CUSTOM_PROMPT="${{ inputs.custom-prompt }}"

        PROMPT="You are a documentation maintainer for the PySpring framework.

        A code change has just been merged to the main branch of the **${SOURCE_REPO}** repository.

        ## Commit Message
        ${COMMIT_MSG}

        ## Code Diff
        \`\`\`diff
        ${DIFF}
        \`\`\`

        ## Current Documentation
        Below is the full content of the documentation site (mkdocs.yml + all markdown files):

        ${DOCS_CONTEXT}

        ## Your Task

        Analyze the code diff and determine if any documentation needs to be updated or created.

        Respond with ONLY valid JSON in this exact format (no markdown fences, no extra text):

        {
          \"needs_update\": true or false,
          \"summary\": \"Brief description of what documentation changes are needed and why\",
          \"changes\": [
            {
              \"file\": \"docs/path/to/file.md\",
              \"action\": \"update or create\",
              \"content\": \"The full content of the file after changes\"
            }
          ]
        }

        Rules:
        - If no documentation changes are needed, set needs_update to false and changes to an empty array.
        - For updated files, provide the COMPLETE file content (not just the diff).
        - For new files, provide the full content.
        - Follow the existing documentation style and conventions visible in the current docs.
        - Only update docs that are directly affected by the code changes.
        - Do NOT modify mkdocs.yml. If a new page is needed, mention it in the summary.
        - Write documentation in the same language/style as existing docs.

        ${CUSTOM_PROMPT}"

        echo "$PROMPT" | claude --print --model "${{ inputs.model }}" > /tmp/claude_output.txt

    - name: Parse and apply changes
      id: apply
      shell: bash
      run: |
        OUTPUT=$(cat /tmp/claude_output.txt)

        # Try to extract JSON from the output (handle potential markdown fences)
        JSON=$(echo "$OUTPUT" | sed -n '/^{/,/^}/p')
        if [ -z "$JSON" ]; then
          # Try removing markdown fences
          JSON=$(echo "$OUTPUT" | sed 's/^```json//;s/^```//' | sed -n '/^{/,/^}/p')
        fi

        if [ -z "$JSON" ]; then
          echo "ERROR: Could not extract valid JSON from Claude output"
          echo "Raw output:"
          cat /tmp/claude_output.txt
          exit 1
        fi

        echo "$JSON" > /tmp/parsed_output.json

        NEEDS_UPDATE=$(echo "$JSON" | jq -r '.needs_update')
        SUMMARY=$(echo "$JSON" | jq -r '.summary')

        if [ "$NEEDS_UPDATE" != "true" ]; then
          echo "No documentation updates needed."
          echo "Summary: $SUMMARY"
          echo "needs_update=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "needs_update=true" >> "$GITHUB_OUTPUT"
        echo "Documentation updates needed: $SUMMARY"
        echo "$SUMMARY" > /tmp/update_summary.txt

        # Apply changes
        CHANGE_COUNT=$(echo "$JSON" | jq '.changes | length')
        echo "Applying $CHANGE_COUNT file change(s)..."

        for i in $(seq 0 $((CHANGE_COUNT - 1))); do
          FILE=$(echo "$JSON" | jq -r ".changes[$i].file")
          ACTION=$(echo "$JSON" | jq -r ".changes[$i].action")
          CONTENT=$(echo "$JSON" | jq -r ".changes[$i].content")

          TARGET_PATH="/tmp/pyspring-docs/${FILE}"
          TARGET_DIR=$(dirname "$TARGET_PATH")

          echo "  ${ACTION}: ${FILE}"
          mkdir -p "$TARGET_DIR"
          echo "$CONTENT" > "$TARGET_PATH"
        done

        # Save list of changed files
        echo "$JSON" | jq -r '.changes[].file' > /tmp/changed_files.txt

    - name: Create PR in docs repo
      if: steps.apply.outputs.needs_update == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        SOURCE_REPO="${{ inputs.source-repo-name }}"
        SHORT_SHA="${{ steps.diff.outputs.short_sha }}"
        SUMMARY=$(cat /tmp/update_summary.txt)
        COMMIT_MSG=$(cat /tmp/commit_msg.txt)
        BRANCH_NAME="docs/update-from-${SOURCE_REPO}-${SHORT_SHA}"

        cd /tmp/pyspring-docs

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git checkout -b "$BRANCH_NAME"
        git add -A
        git diff --cached --quiet && {
          echo "No actual file changes detected after applying updates. Skipping PR creation."
          exit 0
        }

        COMMIT_MESSAGE="docs: update from ${SOURCE_REPO} (${SHORT_SHA})

        ${SUMMARY}

        Source commit: ${SOURCE_REPO}@${SHORT_SHA}

        Co-Authored-By: Claude <noreply@anthropic.com>"

        git commit -m "$COMMIT_MESSAGE"

        git push origin "$BRANCH_NAME"

        CHANGED_FILES=$(cat /tmp/changed_files.txt | sed 's/^/- /')
        MODEL="${{ inputs.model }}"

        PR_BODY="## Summary

        ${SUMMARY}

        ## Source

        - **Repository**: ${SOURCE_REPO}
        - **Commit**: ${SHORT_SHA}
        - **Commit message**: ${COMMIT_MSG}

        ## Changed Files

        ${CHANGED_FILES}

        ----
        *Generated by Claude (${MODEL}) via [PythonSpring/actions/claude-docs-update](https://github.com/PythonSpring/actions)*"

        echo "$PR_BODY" > /tmp/pr_body.txt

        gh pr create \
          --repo "${{ inputs.docs-repo }}" \
          --title "docs: update from ${SOURCE_REPO} (${SHORT_SHA})" \
          --body-file /tmp/pr_body.txt

        echo "PR created successfully!"
